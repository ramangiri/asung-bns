<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="css/style.css">
<style>
:root{
  --logo-teal:#13b8d6;
  --logo-dark:#08132f;
}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(19,184,214,0.20), transparent 28%),
    radial-gradient(circle at bottom right, rgba(8,19,47,0.10), transparent 30%),
    linear-gradient(135deg,#eef6f8,#f7f9fc,#e8f4f7);
  overflow:hidden;
  position:relative;
}
body::before, body::after{
  content:"";
  position:absolute;
  border-radius:50%;
  filter:blur(10px);
  animation:blobMove 10s ease-in-out infinite;
  z-index:0;
}
body::before{
  width:240px;height:240px;top:40px;left:-70px;background:rgba(19,184,214,0.18);
}
body::after{
  width:300px;height:300px;right:-90px;bottom:20px;background:rgba(8,19,47,0.10);animation-delay:2s;
}
@keyframes blobMove{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(20px,-18px) scale(1.05);}
}
.login-card{
  width:420px;
  max-width:92vw;
  padding:38px 30px 30px;
  border-radius:26px;
  background:rgba(255,255,255,0.94);
  box-shadow:0 24px 60px rgba(0,0,0,0.12);
  text-align:center;
  position:relative;
  z-index:1;
  border:1px solid rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  animation:cardEnter .8s ease;
}
@keyframes cardEnter{
  from{opacity:0;transform:translateY(30px) scale(.96);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.logo-wrap{
  width:140px;height:140px;margin:0 auto 14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg, rgba(19,184,214,0.10), rgba(8,19,47,0.04));
  box-shadow:0 10px 30px rgba(19,184,214,0.15);
  animation:haloPulse 3s ease-in-out infinite;
}
@keyframes haloPulse{
  0%,100%{transform:scale(1); box-shadow:0 10px 30px rgba(19,184,214,0.15);}
  50%{transform:scale(1.03); box-shadow:0 16px 36px rgba(19,184,214,0.22);}
}
.logo{width:110px;height:110px;object-fit:contain;animation:logoFloat 4s ease-in-out infinite;}
@keyframes logoFloat{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-6px) rotate(1deg);}
}
.company{font-size:28px;font-weight:800;margin-bottom:6px;color:var(--logo-dark);letter-spacing:.3px;}
.subtitle{font-size:13px;color:var(--logo-teal);font-weight:700;letter-spacing:1.3px;text-transform:uppercase;margin-bottom:10px;}
.desc{font-size:14px;color:#5c6678;line-height:1.55;margin:0 0 24px;}
.field{text-align:left;margin-bottom:16px;}
.field label{display:block;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--logo-dark);}
input{width:100%;height:50px;border-radius:14px;border:1px solid #d7e2e8;padding:0 15px;font-size:14px;box-sizing:border-box;background:#f8fbfd;transition:.25s ease;}
input:focus{border-color:var(--logo-teal);outline:none;background:#fff;box-shadow:0 0 0 4px rgba(19,184,214,0.12);}
button{width:100%;height:52px;border:none;border-radius:14px;background:linear-gradient(135deg, var(--logo-teal), #0aa5c2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:.25s ease;box-shadow:0 12px 24px rgba(19,184,214,0.22);}
button:hover{transform:translateY(-1px);box-shadow:0 16px 28px rgba(19,184,214,0.28);}
.error{margin-top:12px;color:#d92d20;font-size:14px;min-height:18px;}
.footer{margin-top:18px;font-size:12px;color:#6f7b8f;}
@media (max-width:600px){
  .login-card{width:92vw;padding:28px 18px 24px;border-radius:22px;}
  .logo-wrap{width:120px;height:120px;margin-bottom:12px;}
  .logo{width:95px;height:95px;}
  .company{font-size:24px;}
  .desc{font-size:13px;}
  input{height:48px;}
  button{height:50px;}
}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-wrap">
    <img src="assets/logo.jpg" class="logo" alt="ASUNG BNS Logo">
  </div>
  <div class="subtitle">Payslip Management System</div>
  <div class="company">ASUNG BNS</div>
  <p class="desc">Secure admin login for employee management, payslip generation, history and settings.</p>
  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="Enter Email" autocomplete="off" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter Password" autocomplete="new-password" required>
    </div>
    <button type="submit">Login</button>
    <div id="loginError" class="error"></div>
  </form>
  <div class="footer">ASUNG BNS GLOBAL PRIVATE LIMITED</div>
</div>
<script src="js/app.js"></script>
<script>initLogin()</script>
</body>
</html>
