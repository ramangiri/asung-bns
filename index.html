<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <div class="auth-wrap">
        <div class="auth-card">
            <h1>Admin Login</h1>
            <p>Use the default admin credentials to access the payslip system.</p>
            <form id="loginForm">
                <div class="field"><label>Email</label><input id="email" type="email" 
                        required></div>
                <div class="field"><label>Password</label><input id="password" type="password" 
                        required></div><button class="btn full" type="submit">Login</button>
                <div id="loginError" class="error"></div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>initLogin()</script>
</body>

</html>
